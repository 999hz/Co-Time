{% extends 'layouts/base.html' %} {% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 card p-4 shadow-sm border-danger text-center">
    <h3 class="text-danger">¿Cancelar Reserva?</h3>
    <p>
      ¿Estás seguro de que quieres eliminar la reserva en
      <strong>{{ reserva.espacio.nombre }}</strong>?
    </p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger px-4">
        Confirmar Cancelación
      </button>
      <a href="{% url 'reservas:index' %}" class="btn btn-light">Volver</a>
    </form>
  </div>
</div>
{% endblock %}
